<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>HDV Chassis Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="top-bar">
  <div class="brand">
    <img src="images/gm-symbol-color-light-bg-web.png" alt="GM" class="gm-logo">
    <span class="app-title">HDV Chassis Simulator</span>
  </div>
</header>

<div class="container">

  <!-- LEFT -->
  <div class="sidebar">
    <div class="controls">
      <button id="undoBtn">↩ Undo</button>
      <button id="resetBtn">🔄 Reset</button>
    </div>

    <h2>Chassis Parts</h2>

    <div class="preset-controls">
      <h3>Presets</h3>
      <button data-preset="city" onclick="applyPreset('city')">City Package</button>
      <button data-preset="Sport" onclick="applyPreset('Sport')">Sport Package</button>
      <button data-preset="off-road" onclick="applyPreset('off-road')">Off-road Package</button>
    </div>

    <div id="categories"></div>
  </div>

  <!-- CENTER -->
  <div class="main">
    <div class="chassis-container" id="drop-zone">
      <!-- 🔹 샤시 베이스를 <img>로 -->
      <img id="chassis-base" class="chassis-base" src="images/chassis_base.png" alt="Chassis Base">

      <img id="link-part" class="part-layer link-layer">
      <img id="suspension-part" class="part-layer suspension-layer">
      <img id="brakes-left-part"  class="part-layer brakes-left-layer">
      <img id="brakes-right-part" class="part-layer brakes-right-layer">
      <img id="steering-part" class="part-layer steering-layer">

      <div id="chassis-summary" class="chassis-summary">
        Select chassis parts
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="dashboard">
    <h2>Performance</h2>

    <canvas id="handlingGauge" width="200" height="200"></canvas>
    <canvas id="efficiencyGauge" width="200" height="200"></canvas>
    <canvas id="safetyGauge" width="200" height="200"></canvas>
    <canvas id="comfortGauge" width="200" height="200"></canvas>
  </div>

</div>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
