<svg width="600" height="400"
     viewBox="0 0 600 400"
     xmlns="http://www.w3.org/2000/svg"
     preserveAspectRatio="xMidYMid meet">

  <!-- 공통 설정 -->
  <!-- 왼쪽 위/아래 휠 중심: (150, 80), (150, 320) -->
  <!-- 바깥 디스크 반지름: 40, 안쪽 디스크 반지름: 24 -->

  <!-- 위쪽 디스크 -->
  <circle cx="150" cy="80" r="40" fill="#b0b0b0"/>
  <circle cx="150" cy="80" r="24" fill="#555"/>

  <!-- 아래쪽 디스크 -->
  <circle cx="150" cy="320" r="40" fill="#b0b0b0"/>
  <circle cx="150" cy="320" r="24" fill="#555"/>

  <!-- 캘리퍼 비율: 디스크 지름(80)보다 조금 짧게, 두께는 얇게 -->
  <!-- 위쪽 캘리퍼: 바깥 원 상단에 딱 붙게 -->
  <!-- 원 상단 y = cy - r = 80 - 40 = 40 -->
  <!-- 캘리퍼 높이 16 → top = 40 - 16 = 24, bottom = 40 -->
  <!-- 가로폭 50 → center 150 기준 → x = 150 - 25 = 125 -->

  <rect x="125" y="24" width="50" height="16" fill="#e53935"/>

  <!-- 아래쪽 캘리퍼: 바깥 원 하단에 딱 붙게 -->
  <!-- 원 하단 y = cy + r = 320 + 40 = 360 -->
  <!-- top = 360, bottom = 360 + 16 = 376 -->
  <rect x="125" y="360" width="50" height="16" fill="#e53935"/>

</svg>