<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame { fill: none; stroke: #555; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
    .wheel { fill: #333; stroke: #111; stroke-width: 4; }
    .suspension { fill: none; stroke: #777; stroke-width: 4; }
    .spring { fill: none; stroke: #999; stroke-width: 3; }
    .steering { fill: none; stroke: #666; stroke-width: 5; }
  </style>

  <rect x="100" y="80" width="400" height="240" class="frame" />
  <line x1="100" y1="200" x2="500" y2="200" class="frame" stroke-width="6" /> <g transform="translate(450, 320)"> <rect x="-20" y="-50" width="40" height="100" class="wheel" />
    <line x1="-60" y1="0" x2="0" y2="0" class="suspension" /> </g>
  <g transform="translate(450, 80)"> <rect x="-20" y="-50" width="40" height="100" class="wheel" />
    <line x1="-60" y1="0" x2="0" y2="0" class="suspension" /> </g>
    <rect x="420" y="160" width="80" height="80" fill="#444" stroke="#222" stroke-width="3"/> <g transform="translate(150, 320)">
    <rect x="-20" y="-50" width="40" height="100" class="wheel" /> <path d="M -50 -40 L 0 -40 L 10 -20 M -50 40 L 0 40 L 10 20" class="suspension" />
    <path d="M -30 -30 Q -20 -20, -30 -10 Q -40 0, -30 10 Q -20 20, -30 30" class="spring" />
  </g>

  <g transform="translate(150, 80)">
    <rect x="-20" y="-50" width="40" height="100" class="wheel" /> <path d="M -50 -40 L 0 -40 L 10 -20 M -50 40 L 0 40 L 10 20" class="suspension" />
    <path d="M -30 -30 Q -20 -20, -30 -10 Q -40 0, -30 10 Q -20 20, -30 30" class="spring" />
  </g>

  <line x1="160" y1="120" x2="160" y2="280" class="steering" /> <line x1="160" y1="200" x2="200" y2="200" class="steering" /> </svg>