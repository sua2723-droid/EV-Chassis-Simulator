<svg width="600" height="400"
     viewBox="0 0 600 400"
     xmlns="http://www.w3.org/2000/svg"
     preserveAspectRatio="xMidYMid meet">

  <!-- 왼쪽 위/아래 휠 사이 세로 공간에 끼워지는 서스펜션 블록 -->
  <!-- y=120 ~ 280 정도: (80과 320 사이) -->
  <!-- x는 휠에서 차체 안쪽으로 약간 들어온 190 근처 -->
  <rect x="190" y="120" width="40" height="160" fill="#3498db"/>

  <text x="210" y="205" fill="white" text-anchor="middle" font-size="10">
    SUSPENSION
  </text>
</svg>
